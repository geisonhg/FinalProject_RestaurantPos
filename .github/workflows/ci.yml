name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  SOLUTION: RestaurantDashboard.sln
  WEB_PROJECT: backend/RestaurantDashboard/RestaurantDashboard.Web/RestaurantDashboard.Web.csproj

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 · Format check (fast gate — runs before build)
  # ────────────────────────────────────────────────────────────────────────────
  format:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Format check
        run: dotnet format ${{ env.SOLUTION }} --verify-no-changes --no-restore

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 · Build & Test + coverage report
  # ────────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: format

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --no-restore --configuration Release

      - name: Test
        run: |
          dotnet test ${{ env.SOLUTION }} \
            --no-build \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults/ \
            --logger "trx;LogFileName=test-results.trx" \
            --logger "console;verbosity=normal"

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: |
          reportgenerator \
            -reports:"TestResults/**/coverage.cobertura.xml" \
            -targetdir:"TestResults/CoverageReport" \
            -reporttypes:"MarkdownSummaryGithub;Html;Cobertura"

      - name: Post coverage to job summary
        run: cat TestResults/CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: TestResults/CoverageReport/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 · Security — check for vulnerable NuGet packages
  # ────────────────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: format

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Check for vulnerable packages
        run: |
          dotnet list ${{ env.SOLUTION }} package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt
          if grep -q "has the following vulnerable packages" vuln-report.txt; then
            echo "::error::Vulnerable NuGet packages found. See report above."
            exit 1
          fi

      - name: Check for deprecated packages
        run: dotnet list ${{ env.SOLUTION }} package --deprecated 2>&1 | tee deprecated-report.txt
        continue-on-error: true

      - name: Post security summary
        if: always()
        run: |
          echo "## Security Scan" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat vuln-report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 4 · Publish artifact (only on push to main)
  # ────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [build-and-test, security]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Publish web app
        run: |
          dotnet publish ${{ env.WEB_PROJECT }} \
            --no-restore \
            --configuration Release \
            --output publish/

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: restaurant-pos-web
          path: publish/
          retention-days: 30
